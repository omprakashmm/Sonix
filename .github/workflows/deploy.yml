name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────
  # Backend lint + test
  # ─────────────────────────────────────────
  backend:
    name: Backend — lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: openwave
          POSTGRES_PASSWORD: openwave
          POSTGRES_DB: openwave_test
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npx prisma generate
        env:
          DATABASE_URL: postgresql://openwave:openwave@localhost:5432/openwave_test

      - run: npm run lint --if-present
      - run: npm test --if-present
        env:
          DATABASE_URL: postgresql://openwave:openwave@localhost:5432/openwave_test
          JWT_SECRET: ci-secret
          NODE_ENV: test

  # ─────────────────────────────────────────
  # Frontend lint + build
  # ─────────────────────────────────────────
  frontend:
    name: Frontend — lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint --if-present
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001/api
          NEXTAUTH_SECRET: ci-secret
          NEXTAUTH_URL: http://localhost:3000

  # ─────────────────────────────────────────
  # Deploy frontend to Vercel (main only)
  # ─────────────────────────────────────────
  deploy-frontend:
    name: Deploy — Vercel
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          vercel-args: '--prod'

  # ─────────────────────────────────────────
  # Build & push backend Docker image (main only)
  # ─────────────────────────────────────────
  deploy-backend:
    name: Deploy — Docker (backend)
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
