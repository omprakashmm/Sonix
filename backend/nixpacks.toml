# Railway / Nixpacks — installs system dependencies for the backend
# ffmpeg  : audio conversion
# yt-dlp  : YouTube audio download

[phases.setup]
nixPkgs = ["ffmpeg", "python312Packages.yt-dlp"]

[phases.install]
cmds = ["npm install --include=dev"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm start"
